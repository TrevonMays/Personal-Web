<div>
  <h2 class="projectTitle">Project 1 - The Dynamic Business Card</h2>
  <hr>
  <form>
    <fieldset>
      <legend>Modify Your Business Card</legend>
      
      <label>First Name</label>
      <input id="firstNameInput" (input)="setProperty($event)"><br>

      <label>Last Name</label>
      <input id="lastNameInput" (input)="setProperty($event)"><br>

      <label>Phone Number</label>
      <input id="phoneNumberInput" (input)="setProperty($event)"><br>

      <label>Email</label>
      <input id="emailInput" (input)="setProperty($event)"><br>

      <label>Job Title</label>
      <input id="jobTitleInput" (input)="setProperty($event)">
      
      <label>Address</label>
      <input id="addressInput" class="addressInput" (input)="setProperty($event)"><br>

      <label>Color</label>
      <input id="colorInput" type="color" [value]="color" (input)="setProperty($event)"><br>
    </fieldset>
  </form>

  <button class="card"
  [style.background-color]="color"
  >
    <div class="row clearfix">
      <div class="left big">{{ phoneNumber }}</div>
      <div class="right">
        <p><span class="big">E</span>rnst & <span class="big">S</span>ohn</p>
        <p>
          <span class="med no-space">A W</span><span class="small no-space">iley </span>
          <span class="med no-space">B</span><span class="small no-space">rand</span>
        </p>
      </div>
    </div>

    <div class="row">
      <p class="capitalize">{{ firstName }} <span class="capitalize">{{ lastName }}</span></p>
      <p class="capitalize">{{ jobTitle }}</p>
    </div>

    <div class="row">
      <address>{{address}}</address>
    </div>

    <div class="row">
        <p><span class="med">Phone:</span> {{ phoneNumber }}</p>
    </div>

    <div class="row">
      <p><span class="med">Email:</span> {{ email }}</p>
    </div>
  </button>
</div>
